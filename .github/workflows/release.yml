name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      # Check out main (not the detached tag) so we can push the cask update back.
      # Tag releases from the tip of main so the built code matches the tag.
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Build app bundle
        run: ./build.sh

      - name: Package and hash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ditto -c -k --sequesterRsrc --keepParent Zap.app Zap.zip
          SHA=$(shasum -a 256 Zap.zip | awk '{print $1}')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "SHA=$SHA" >> "$GITHUB_ENV"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: Zap.zip
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

      - name: Update Homebrew cask
        run: |
          sed -i '' "s/version \".*\"/version \"$VERSION\"/" Casks/zap.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"$SHA\"/" Casks/zap.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/zap.rb
          git commit -m "chore(cask): update to v$VERSION" || echo "cask unchanged"
          git push origin HEAD:main
